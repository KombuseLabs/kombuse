appId: com.kombuse.app
productName: Kombuse
directories:
  output: release
  buildResources: build-resources

# Shell code goes in ASAR
files:
  - dist/shell/**/*
  - "!**/*.{ts,map,md}"

# Native modules and their deps must be outside ASAR
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**

# Package bundled as separate resource (not in ASAR)
extraResources:
  - from: dist/package
    to: package
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  target: dmg
  artifactName: "${productName}-${version}-${arch}.${ext}"
  # Code signing disabled for now - add later:
  # identity: "Developer ID Application: Your Name (TEAM_ID)"
  # notarize: true

# Create symlink for native modules in package directory
afterPack: ./build/afterPack.cjs

# GitHub Releases via action, not electron-builder publish
publish: null
