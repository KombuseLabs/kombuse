name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  desktop:
    name: Desktop Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run --filter desktop test

      - name: Check types
        run: bun run --filter desktop check-types
