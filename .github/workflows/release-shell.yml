name: Release Shell

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build package
        run: bun run --filter desktop build:package

      - name: Build shell
        run: bun run --filter desktop build:shell
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3 --arch ${{ matrix.arch }}
        working-directory: apps/desktop

      - name: Import code signing certificate
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          echo "$MAC_CERTIFICATE_BASE64" | base64 --decode > "$CERT_FILE"
          KEYCHAIN=build.keychain
          security create-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERT_FILE" -k "$KEYCHAIN" -P "$MAC_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm "$CERT_FILE"

      - name: Build Electron app
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: H7SA7BKZZ2

      - name: Rename latest-mac.yml for architecture
        run: mv apps/desktop/release/latest-mac.yml apps/desktop/release/latest-mac-${{ matrix.arch }}.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shell-release-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/latest-mac-${{ matrix.arch }}.yml

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shell-release-*
          merge-multiple: true

      - name: Merge latest-mac.yml from both architectures
        run: |
          yq eval-all '
            select(fileIndex == 0).files += select(fileIndex == 1).files |
            select(fileIndex == 0)
          ' latest-mac-arm64.yml latest-mac-x64.yml > latest-mac.yml

      - name: Validate updater manifest and release artifacts
        run: |
          set -euo pipefail
          echo "--- Validating latest-mac.yml ---"

          # File must exist and be non-empty
          test -s latest-mac.yml

          # version must be present and non-null
          VERSION=$(yq '.version' latest-mac.yml)
          test -n "$VERSION" && test "$VERSION" != "null"
          echo "version: $VERSION"

          # 4 file entries expected (zip + dmg for each of arm64 + x64)
          FILE_COUNT=$(yq '.files | length' latest-mac.yml)
          test "$FILE_COUNT" -eq 4
          echo "files count: $FILE_COUNT"

          # Required fields must be present
          grep -q 'sha512:' latest-mac.yml
          grep -q 'url:' latest-mac.yml
          grep -q '^path:' latest-mac.yml

          # Both architectures must be represented
          grep -q 'arm64' latest-mac.yml
          grep -q 'x64' latest-mac.yml

          echo "--- Manifest validation passed ---"
          ls -lh *.dmg *.zip latest-mac*.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            *.dmg
            *.zip
            latest-mac.yml
            latest-mac-arm64.yml
            latest-mac-x64.yml
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
