name: Release Shell

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Build package
        run: bun run --filter desktop build:package

      - name: Build shell
        run: bun run --filter desktop build:shell

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3 --arch ${{ matrix.arch }}
        working-directory: apps/desktop

      - name: Build Electron app
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename latest-mac.yml for architecture
        run: mv apps/desktop/release/latest-mac.yml apps/desktop/release/latest-mac-${{ matrix.arch }}.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shell-release-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/latest-mac-${{ matrix.arch }}.yml

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shell-release-*
          merge-multiple: true

      - name: Merge latest-mac.yml from both architectures
        run: |
          yq eval-all '
            select(fileIndex == 0) |
            .files = [select(fileIndex == 0).files[], select(fileIndex == 1).files[]]
          ' latest-mac-arm64.yml latest-mac-x64.yml > latest-mac.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.zip
            latest-mac.yml
          generate_release_notes: true
